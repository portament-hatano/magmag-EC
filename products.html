<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>商品一覧・検索 | まぐまぐストア</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="user">

<header class="site-header">
  <div class="wrap header-in">
    <a class="logo" href="index.html"><span class="logo-mark">m!</span> まぐまぐストア</a>
    <nav class="gnav">
      <a href="products.html" class="active">商品をさがす</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
    <div class="header-actions">
      <a class="btn btn-ghost btn-sm" href="login.html">ログイン</a>
      <a class="btn btn-primary btn-sm" href="mypage.html">マイページ</a>
    </div>
  </div>
</header>

<main class="wrap" style="padding-top:34px;padding-bottom:60px">
  <h1 class="page-title">商品をさがす</h1>
  <p class="page-desc">対談権・アーカイブの絞り込みや、クリエイター別の表示ができます。クリエイター名をクリックすると本人のページに移動します。</p>

  <div class="filter-bar">
    <div class="chips" id="type-chips">
      <button class="chip active" data-type="all">すべて</button>
      <button class="chip" data-type="talk">🎤 対談権</button>
      <button class="chip" data-type="arch">📚 アーカイブ</button>
    </div>
    <select class="in" style="width:auto" id="creator-filter">
      <option value="all">クリエイター：すべて</option>
      <option value="horikawa">堀川 蓮</option>
      <option value="saotome">早乙女 香織</option>
      <option value="mishima">三嶋 剛</option>
      <option value="shiraishi">白石 悠</option>
      <option value="kamiya">神谷 真琴</option>
      <option value="omori">大森 一樹</option>
    </select>
    <select class="in" style="width:auto">
      <option>並び順：おすすめ</option><option>新着順</option><option>価格が安い順</option><option>価格が高い順</option>
    </select>
    <input class="in" style="flex:1;min-width:160px" type="search" placeholder="🔍 キーワードで検索（例：マーケティング）">
  </div>

  <div class="grid3" id="product-grid"></div>

  <div style="display:flex;justify-content:center;gap:8px;margin-top:34px">
    <a class="btn btn-primary btn-sm" href="#">1</a>
    <a class="btn btn-ghost btn-sm" href="#">2</a>
    <a class="btn btn-ghost btn-sm" href="#">3</a>
    <a class="btn btn-ghost btn-sm" href="#">次へ →</a>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap foot-in">
    <div class="foot-brand"><span class="logo-mark">m!</span> まぐまぐストア <span class="demo-tag">デモ</span></div>
    <nav class="foot-links">
      <a href="terms.html">利用規約</a>
      <a href="terms.html">プライバシーポリシー</a>
      <a href="terms.html">特定商取引法に基づく表記</a>
      <a href="contact.html">お問い合わせ</a>
      <a href="pages.html">📋 全ページ一覧（デモ用）</a>
    </nav>
    <p class="copyright">© 2026 まぐまぐストア（デモサイト）— 掲載の人物・商品・金額はすべて架空です。</p>
  </div>
</footer>
<script src="assets/data.js"></script>
<script>
(function () {
  var order = ["t-horikawa30", "t-saotome45", "t-mishima30", "t-horikawa60", "t-kamiya30",
    "a-saotome-h1", "a-horikawa-06", "a-mishima-06", "a-shiraishi-a", "a-kamiya-05", "a-omori-06"];
  var grid = document.getElementById("product-grid");
  var type = "all", creator = "all";
  function draw() {
    grid.innerHTML = order.filter(function (id) {
      var p = MG.products[id];
      return (type === "all" || p.type === type) && (creator === "all" || p.c === creator);
    }).map(function (id) { return MG.card(id); }).join("");
    // カード再生成後に人名クリックを配線し直す
    grid.querySelectorAll(".c-jump").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.preventDefault(); e.stopPropagation();
        location.href = "creator.html?c=" + el.dataset.c;
      });
    });
  }
  document.querySelectorAll("#type-chips .chip").forEach(function (ch) {
    ch.addEventListener("click", function () {
      document.querySelectorAll("#type-chips .chip").forEach(function (x) { x.classList.toggle("active", x === ch); });
      type = ch.dataset.type;
      draw();
    });
  });
  document.getElementById("creator-filter").addEventListener("change", function () {
    creator = this.value;
    draw();
  });
  draw();
})();
</script>
<script src="assets/common.js"></script>
</body>
</html>
