<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>クリエイターページ | まぐまぐストア</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="user">

<header class="site-header">
  <div class="wrap header-in">
    <a class="logo" href="index.html"><span class="logo-mark">m!</span> まぐまぐストア</a>
    <nav class="gnav">
      <a href="products.html" class="active">商品をさがす</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
    <div class="header-actions">
      <a class="btn btn-ghost btn-sm" href="login.html">ログイン</a>
      <a class="btn btn-primary btn-sm" href="mypage.html">マイページ</a>
    </div>
  </div>
</header>

<main class="wrap" style="padding-top:26px;padding-bottom:60px">
  <p style="font-size:12px;color:var(--faint);margin-bottom:18px"><a href="index.html">ホーム</a> › <a href="products.html">商品一覧</a> › <span id="bc-name">クリエイター</span></p>

  <div class="card card-pad" style="display:flex;gap:24px;align-items:center;margin-bottom:30px;flex-wrap:wrap">
    <span class="avatar xl" id="c-avatar">？</span>
    <div style="flex:1;min-width:240px">
      <b style="font-size:21px" id="c-name">クリエイター</b><span style="font-size:12px;color:var(--sub)" id="c-kana"></span>
      <p style="font-size:13px;color:var(--accent-d);font-weight:700" id="c-role"></p>
      <p style="font-size:13.5px;color:var(--sub);margin-top:6px" id="c-bio"></p>
      <div class="share-row" style="margin-top:10px">
        <a class="share-btn share-x" style="padding:5px 16px;font-size:12px" href="#" onclick="alert('（デモ）Xのプロフィールを開きます');return false" id="c-x">𝕏 フォロー</a>
      </div>
    </div>
  </div>

  <section id="sec-talk">
    <h2 style="font-family:var(--f-round);font-size:19px;font-weight:900;margin-bottom:14px">🎤 対談権</h2>
    <div class="grid3" id="talk-grid" style="margin-bottom:34px"></div>
  </section>

  <section id="sec-arch">
    <h2 style="font-family:var(--f-round);font-size:19px;font-weight:900;margin-bottom:14px">📚 メルマガアーカイブ</h2>
    <div class="grid3" id="arch-grid"></div>
  </section>

  <p style="text-align:center;margin-top:36px"><a class="btn btn-ghost" href="products.html">すべてのクリエイターの商品を見る →</a></p>
</main>

<footer class="site-footer">
  <div class="wrap foot-in">
    <div class="foot-brand"><span class="logo-mark">m!</span> まぐまぐストア <span class="demo-tag">デモ</span></div>
    <nav class="foot-links">
      <a href="terms.html">利用規約</a>
      <a href="contact.html">お問い合わせ</a>
      <a href="pages.html">📋 全ページ一覧（デモ用）</a>
    </nav>
    <p class="copyright">© 2026 まぐまぐストア（デモサイト）— 掲載の人物・商品・金額はすべて架空です。</p>
  </div>
</footer>
<script src="assets/data.js"></script>
<script>
(function () {
  var cid = new URLSearchParams(location.search).get("c") || "horikawa";
  var c = MG.creators[cid] || MG.creators.horikawa;
  if (!MG.creators[cid]) cid = "horikawa";
  document.title = c.name + "のページ | まぐまぐストア";
  document.getElementById("bc-name").textContent = c.name;
  var av = document.getElementById("c-avatar");
  av.className = "avatar xl " + c.av;
  av.textContent = c.init;
  document.getElementById("c-name").textContent = c.name;
  document.getElementById("c-kana").textContent = "（" + c.kana + "）";
  document.getElementById("c-role").textContent = c.role;
  document.getElementById("c-bio").textContent = c.bio;
  document.getElementById("c-x").textContent = "𝕏 " + c.x + " をフォロー";

  var talks = [], archs = [];
  Object.keys(MG.products).forEach(function (pid) {
    var p = MG.products[pid];
    if (p.c !== cid) return;
    (p.type === "talk" ? talks : archs).push(pid);
  });
  document.getElementById("talk-grid").innerHTML = talks.map(function (id) { return MG.card(id); }).join("");
  document.getElementById("arch-grid").innerHTML = archs.map(function (id) { return MG.card(id); }).join("");
  if (!talks.length) document.getElementById("sec-talk").style.display = "none";
  if (!archs.length) document.getElementById("sec-arch").style.display = "none";
})();
</script>
<script src="assets/common.js"></script>
</body>
</html>
