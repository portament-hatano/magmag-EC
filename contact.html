<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お問い合わせ | まぐまぐストア</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="user">

<header class="site-header">
  <div class="wrap header-in">
    <a class="logo" href="index.html"><span class="logo-mark">m!</span> まぐまぐストア</a>
    <nav class="gnav">
      <a href="products.html">商品をさがす</a>
      <a href="contact.html" class="active">お問い合わせ</a>
    </nav>
    <div class="header-actions"><a class="btn btn-primary btn-sm" href="mypage.html">マイページ</a></div>
  </div>
</header>

<main class="wrap" style="padding-top:30px;padding-bottom:60px;max-width:680px">
  <h1 class="page-title">お問い合わせ</h1>
  <p class="page-desc">ご不明点・トラブルはこちらからご連絡ください。通常2営業日以内に返信します。</p>

  <div class="card card-pad">
    <div class="field">
      <label>お問い合わせの種類<span class="req">必須</span></label>
      <select class="in">
        <option>選択してください</option>
        <option>購入・決済について</option>
        <option>対談の予約・日程について</option>
        <option>キャンセル・返金について</option>
        <option>アーカイブの閲覧について</option>
        <option>クリエイター登録について</option>
        <option>その他</option>
      </select>
    </div>
    <div class="field">
      <label>対象の注文番号（任意）</label>
      <input class="in" placeholder="例：MG-2026-004512">
      <p class="form-hint">マイページの購入履歴で確認できます</p>
    </div>
    <div class="field">
      <label>メールアドレス<span class="req">必須</span></label>
      <input class="in" type="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>お問い合わせ内容<span class="req">必須</span></label>
      <textarea class="in" style="min-height:150px" placeholder="できるだけ具体的にご記入ください"></textarea>
    </div>
    <button class="btn btn-accent btn-block" data-demo-submit="（デモ）お問い合わせを受け付けました。受付番号 CS-2026-0847 をメールでお送りします。" data-demo-next="index.html">送信する</button>
  </div>

  <div class="note note-info" style="margin-top:20px"><b>ℹ️ 実装メモ</b> このフォームは運営側の「CS対応管理」画面（<a href="admin-cs.html" style="text-decoration:underline">admin-cs.html</a>）に起票される想定です。</div>
</main>

<footer class="site-footer">
  <div class="wrap foot-in">
    <div class="foot-brand"><span class="logo-mark">m!</span> まぐまぐストア <span class="demo-tag">デモ</span></div>
    <nav class="foot-links">
      <a href="terms.html">利用規約</a>
      <a href="terms.html">プライバシーポリシー</a>
      <a href="terms.html">特定商取引法に基づく表記</a>
      <a href="pages.html">📋 全ページ一覧（デモ用）</a>
    </nav>
    <p class="copyright">© 2026 まぐまぐストア（デモサイト）— 掲載の人物・商品・金額はすべて架空です。</p>
  </div>
</footer>
<script src="assets/common.js"></script>
</body>
</html>
